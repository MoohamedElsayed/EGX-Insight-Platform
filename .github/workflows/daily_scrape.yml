name: Daily Stock Scraper & Indicators

on:
  schedule:
    - cron: '0 6 * * 0-4'
  
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pandas psycopg2-binary python-dotenv yfinance pandas_ta

      - name: 1. Fetch Today's Prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python fetch_prices.py

      - name: 2. Calculate Indicators
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python calc_indicators.py